<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>家庭时钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080810;
    color: #fff;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 32px 20px;
  }

  .greeting {
    font-size: 20px;
    font-weight: 300;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    min-height: 26px;
  }

  .time-display {
    font-size: 116px;
    font-weight: 200;
    letter-spacing: -4px;
    line-height: 1;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  .colon {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%,100%{opacity:1} 50%{opacity:0.15}
  }

  .seconds-bar-wrap {
    width: 320px;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    margin: 18px 0 24px;
    overflow: hidden;
  }
  .seconds-bar {
    height: 100%;
    background: linear-gradient(90deg, #4a9eff, #a78bfa);
    border-radius: 2px;
    transition: width 0.25s linear;
  }

  .date-display {
    font-size: 24px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.05em;
    margin-bottom: 6px;
  }

  .weekday-display {
    font-size: 16px;
    font-weight: 300;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.18em;
  }

  .divider {
    width: 240px;
    height: 0.5px;
    background: rgba(255,255,255,0.1);
    margin: 26px 0;
  }

  /* Weather block */
  .weather-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-height: 90px;
  }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .weather-icon {
    font-size: 44px;
    line-height: 1;
  }

  .weather-temp {
    font-size: 56px;
    font-weight: 200;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }

  .weather-desc {
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.1em;
  }

  .weather-detail {
    font-size: 13px;
    color: rgba(255,255,255,0.28);
    letter-spacing: 0.06em;
  }

  .weather-loading {
    font-size: 14px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.08em;
  }

  .weather-error {
    font-size: 13px;
    color: rgba(255,100,100,0.5);
  }

  .divider2 {
    width: 240px;
    height: 0.5px;
    background: rgba(255,255,255,0.08);
    margin: 24px 0 20px;
  }

  .bottom-row {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .info-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .info-label {
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .info-value {
    font-size: 20px;
    font-weight: 300;
    color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }

  .lunar-text {
    font-size: 13px;
    color: rgba(255,255,255,0.22);
    margin-top: 18px;
    letter-spacing: 0.06em;
  }

  .tap-hint {
    position: fixed;
    bottom: 18px;
    right: 20px;
    font-size: 10px;
    color: rgba(255,255,255,0.1);
    letter-spacing: 0.08em;
  }

  .refresh-btn {
    position: fixed;
    bottom: 14px;
    left: 20px;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 6px;
  }

  body.dim-mode { background: #000; }
  body.dim-mode .time-display { color: #aaa; }
  body.dim-mode .weather-temp { color: rgba(170,170,170,0.7); }
  body.dim-mode .weather-icon { opacity: 0.4; }
  body.dim-mode .date-display,
  body.dim-mode .weekday-display,
  body.dim-mode .info-value,
  body.dim-mode .greeting { opacity: 0.3; }
  body.dim-mode .seconds-bar { opacity: 0.15; }
</style>
</head>
<body>

<div class="container">
  <div class="greeting" id="greeting">你好</div>

  <div class="time-display">
    <span id="hour">--</span><span class="colon">:</span><span id="minute">--</span>
  </div>

  <div class="seconds-bar-wrap">
    <div class="seconds-bar" id="sec-bar" style="width:0%"></div>
  </div>

  <div class="date-display" id="date-display">加载中…</div>
  <div class="weekday-display" id="weekday"></div>

  <div class="divider"></div>

  <div class="weather-block" id="weather-block">
    <div class="weather-loading" id="weather-status">正在获取位置和天气…</div>
  </div>

  <div class="divider2"></div>

  <div class="bottom-row">
    <div class="info-block">
      <div class="info-label">秒</div>
      <div class="info-value" id="second-val">--</div>
    </div>
    <div class="info-block">
      <div class="info-label">今年第</div>
      <div class="info-value" id="day-of-year">--</div>
    </div>
    <div class="info-block">
      <div class="info-label">天</div>
      <div class="info-value" style="color:rgba(255,255,255,0.18)">天</div>
    </div>
  </div>

  <div class="lunar-text" id="lunar-text"></div>
</div>

<div class="tap-hint">点击切换护眼模式</div>
<div class="refresh-btn" onclick="fetchWeather()">刷新天气</div>

<script>
const weekdaysFull = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
const greetings = [[5,9,'早上好'],[9,11,'上午好'],[11,13,'中午好'],[13,18,'下午好'],[18,22,'晚上好'],[22,24,'夜深了'],[0,5,'深夜了']];

function pad(n){ return String(n).padStart(2,'0'); }

function getDayOfYear(d){
  return Math.floor((d - new Date(d.getFullYear(),0,0)) / 86400000);
}

function getGreeting(h){
  for(const [s,e,g] of greetings) if(h>=s && h<e) return g;
  return '你好';
}

function getLunarYear(year){
  const h=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const e=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const a=['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
  return h[(year-4)%10]+e[(year-4)%12]+'年 · '+a[(year-4)%12]+'年';
}

// WMO weather code to Chinese description + emoji
function decodeWeather(code){
  if(code===0) return {desc:'晴天',icon:'☀️'};
  if(code<=2) return {desc:'多云',icon:'⛅'};
  if(code===3) return {desc:'阴天',icon:'☁️'};
  if(code<=49) return {desc:'有雾',icon:'🌫️'};
  if(code<=59) return {desc:'毛毛雨',icon:'🌦️'};
  if(code<=69) return {desc:'降雨',icon:'🌧️'};
  if(code<=79) return {desc:'降雪',icon:'❄️'};
  if(code<=82) return {desc:'阵雨',icon:'🌧️'};
  if(code<=86) return {desc:'阵雪',icon:'🌨️'};
  if(code<=99) return {desc:'雷阵雨',icon:'⛈️'};
  return {desc:'未知',icon:'🌡️'};
}

let weatherLoaded = false;

function renderWeather(temp, code, humidity, city){
  const w = decodeWeather(code);
  const block = document.getElementById('weather-block');
  block.innerHTML = `
    <div class="weather-main">
      <span class="weather-icon">${w.icon}</span>
      <span class="weather-temp">${Math.round(temp)}°</span>
    </div>
    <div class="weather-desc">${w.desc}</div>
    <div class="weather-detail">湿度 ${humidity}% · ${city}</div>
  `;
}

function fetchWeather(){
  if(!navigator.geolocation){
    document.getElementById('weather-status') && (document.getElementById('weather-block').innerHTML = '<div class="weather-error">此浏览器不支持定位</div>');
    return;
  }
  document.getElementById('weather-block').innerHTML = '<div class="weather-loading">正在获取位置…</div>';

  navigator.geolocation.getCurrentPosition(function(pos){
    const lat = pos.coords.latitude.toFixed(4);
    const lon = pos.coords.longitude.toFixed(4);

    document.getElementById('weather-block').innerHTML = '<div class="weather-loading">正在获取天气…</div>';

    // Reverse geocode with nominatim
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lon+'&format=json&accept-language=zh')
      .then(r=>r.json())
      .then(geo=>{
        const city = geo.address.city || geo.address.town || geo.address.county || geo.address.state || '当前位置';

        // Open-Meteo free weather API - no key needed
        return fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto')
          .then(r=>r.json())
          .then(data=>{
            const cur = data.current;
            renderWeather(cur.temperature_2m, cur.weather_code, cur.relative_humidity_2m, city);
            weatherLoaded = true;
          });
      })
      .catch(()=>{
        // Try weather without city name
        fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,relative_humidity_2m,weather_code&timezone=auto')
          .then(r=>r.json())
          .then(data=>{
            const cur = data.current;
            renderWeather(cur.temperature_2m, cur.weather_code, cur.relative_humidity_2m, '当前位置');
            weatherLoaded = true;
          })
          .catch(()=>{
            document.getElementById('weather-block').innerHTML = '<div class="weather-error">天气获取失败，请检查网络</div>';
          });
      });

  }, function(err){
    let msg = '位置获取失败';
    if(err.code===1) msg = '已拒绝位置权限，请在Safari设置中允许';
    document.getElementById('weather-block').innerHTML = '<div class="weather-error">'+msg+'</div>';
  }, {timeout:10000});
}

function tick(){
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ms = now.getMilliseconds();

  document.getElementById('hour').textContent = pad(h);
  document.getElementById('minute').textContent = pad(m);
  document.getElementById('second-val').textContent = pad(s);
  document.getElementById('sec-bar').style.width = ((s + ms/1000)/60*100) + '%';

  const mon = now.getMonth()+1;
  const day = now.getDate();
  document.getElementById('date-display').textContent = now.getFullYear()+'年 '+mon+'月'+day+'日';
  document.getElementById('weekday').textContent = weekdaysFull[now.getDay()];
  document.getElementById('day-of-year').textContent = getDayOfYear(now);
  document.getElementById('greeting').textContent = getGreeting(h);
  document.getElementById('lunar-text').textContent = getLunarYear(now.getFullYear());

  // Refresh weather every 30 minutes
  if(s===0 && m%30===0 && h!==0) fetchWeather();
}

tick();
setInterval(tick, 250);
fetchWeather();

document.body.addEventListener('click', function(e){
  if(e.target.classList.contains('refresh-btn')) return;
  document.body.classList.toggle('dim-mode');
});

document.addEventListener('touchstart', function(){}, {passive:true});
</script>
</body>
</html>
